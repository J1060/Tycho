<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>tycho News</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* =========================
   NEWSPAPER LIGHT THEME
   ========================= */

.read-more {
  color: #1a73e8;
  font-weight: 600;
  cursor: pointer;
}

body {
  margin: 0;
  font-family: "Georgia", "Times New Roman", serif;
  background: #f5f5f2;
  color: #111;
}

/* jemné novinové pozadí */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    linear-gradient(transparent 31px, rgba(0,0,0,0.03) 32px),
    linear-gradient(90deg, transparent 31px, rgba(0,0,0,0.03) 32px);
  background-size: 32px 32px;
  pointer-events: none;
  opacity: 0.4;
}

/* HEADER */
header {
  position: sticky;
  top: 0;
  z-index: 50;

  background: #ffffff;
  border-bottom: 2px solid #ddd;

  padding: 18px 20px;
  font-weight: 700;
  font-size: 20px;
  letter-spacing: 1px;

  text-transform: uppercase;
}

/* LAYOUT */
main {
  max-width: 900px;
  margin: auto;
  padding: 24px;
}

/* =========================
   TOOLBAR
   ========================= */

.toolbar {
  display: flex;
  gap: 12px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

input, select {
  background: #fff;
  border: 1px solid #ccc;
  color: #111;
  padding: 12px 14px;
  border-radius: 6px;
  outline: none;
  flex: 1;
  min-width: 180px;
  transition: 0.2s;
  font-family: inherit;
}

input:focus {
  border-color: #000;
}

/* =========================
   ARTICLE LIST (NEWSPAPER STYLE)
   ========================= */

.article-preview {
  background: #fff;
  border-bottom: 1px solid #ddd;
  margin-bottom: 12px;
  padding: 18px;

  cursor: pointer;
  transition: 0.15s;
}

.article-preview:hover {
  background: #f0f0ec;
}

/* TITULEK */
.article-preview h2 {
  margin: 0 0 8px 0;
  font-size: 20px;
  font-weight: 700;
}

/* PREVIEW TEXT */
.article-preview p {
  margin: 0;
  color: #333;
  font-size: 15px;
  line-height: 1.5;
}

/* TAGS */
.tags {
  margin-top: 10px;
  font-size: 12px;
  color: #666;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* =========================
   ARTICLE DETAIL
   ========================= */

.article-full {
  background: #fff;
  padding: 30px;
  border: 1px solid #ddd;
  line-height: 1.8;
  font-size: 16px;
}

.article-full img {
  max-width: 100%;
  height: auto;
  margin: 16px 0;
  border-radius: 8px;
  border: 1px solid #ddd;
}

/* BACK BUTTON */
button {
  margin-bottom: 16px;
  padding: 10px 14px;
  border-radius: 6px;
  border: 1px solid #ccc;
  background: #fff;
  color: #111;
  cursor: pointer;
  font-family: inherit;
}

button:hover {
  background: #eee;
}

/* HIGHLIGHT */
mark {
  background: #000;
  color: #fff;
  padding: 0 4px;
}

/* =========================
   RESPONSIVE
   ========================= */

@media (max-width: 640px) {
  main {
    padding: 14px;
  }

  header {
    font-size: 16px;
  }

  .article-preview h2 {
    font-size: 18px;
  }

  .toolbar {
    flex-direction: column;
  }
}
</style>
</head>

<body>

<header>
  TYCHO News
</header>

<main>

  <div class="toolbar">
    <input id="search" placeholder="Search articles..." />
    <select id="tagFilter">
      <option value="all">All topics</option>
    </select>
  </div>

  <div id="content"></div>

</main>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
let articles = [];
let cache = {};

const contentDiv = document.getElementById("content");
const searchInput = document.getElementById("search");
const tagFilter = document.getElementById("tagFilter");

async function loadIndex() {
  const res = await fetch("markdown/index.json");
  articles = await res.json();

  for (let a of articles) {
    const md = await loadMarkdown(a.file);
    const title = extractTitle(md);
    a.slug = a.slug || slugify(title);
  }

  fillTagFilter();
  router();
}

async function loadMarkdown(file) {
  if (cache[file]) return cache[file];

  const res = await fetch("markdown/" + file);
  const text = await res.text();

  cache[file] = text;
  return text;
}

function extractTitle(md) {
  const match = md.match(/^# (.*)/);
  return match ? match[1] : "Untitled";
}

function extractPreview(md) {
  const lines = md.split("\n").filter(l => l.trim());
  return lines[1] || "";
}

function getAllTags() {
  const set = new Set();
  articles.forEach(a => a.tags.forEach(t => set.add(t)));
  return [...set];
}

function fillTagFilter() {
  getAllTags().forEach(tag => {
    const opt = document.createElement("option");
    opt.value = tag;
    opt.textContent = tag;
    tagFilter.appendChild(opt);
  });
}

function scoreText(text, query) {
  if (!query) return 1;

  const t = text.toLowerCase();
  const q = query.toLowerCase();

  let score = 0;

  if (t.includes(q)) score += 5;

  for (let w of q.split(" ").filter(Boolean)) {
    score += (t.match(new RegExp(w, "g")) || []).length;
  }

  return score;
}

function slugify(text) {
  return text
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-+|-+$/g, "");
}

async function showList() {
  contentDiv.innerHTML = "";

  const search = searchInput.value;
  const tag = tagFilter.value;

  let results = [];

  for (let a of articles) {
    const md = await loadMarkdown(a.file);

    const title = extractTitle(md);
    const preview = extractPreview(md);

    if (tag !== "all" && !a.tags.includes(tag)) continue;

    const score =
      scoreText(title, search) * 5 +
      scoreText(preview, search) * 3 +
      scoreText(md, search);

    if (search && score === 0) continue;

    const slug = a.slug || slugify(title);
    results.push({ a, md, title, preview, score, slug });
  }

  results.sort((a, b) => b.score - a.score);

  results.forEach(r => {
    const div = document.createElement("div");
    div.className = "article-preview";

    div.innerHTML = `
      <h2>${r.title}</h2>
      <p>
        ${r.preview}
        <span class="read-more"> číst dále</span>
      </p>
      <div class="tags">${r.a.tags.join(" • ")}</div>
    `;

    div.onclick = () => {
      window.location.hash = r.slug;
      showArticle(r.a.file);
    };

    contentDiv.appendChild(div);
  });
}

async function showArticle(file) {
  const md = await loadMarkdown(file);
  const html = marked.parse(md);

  contentDiv.innerHTML = `
    <button onclick="goHome()">← Back</button>
    <div class="article-full">${html}</div>
  `;
}

function goHome() {
  window.location.hash = "";
  showList();
}

function router() {
  const hash = window.location.hash.replace("#", "");

  const a = articles.find(x => {
    if (x.slug === hash) return true;

    // fallback: slug z názvu
    const title = cache[x.file]
      ? extractTitle(cache[x.file])
      : null;

    if (!title) return false;

    return slugify(title) === hash;
  });

  if (a) showArticle(a.file);
  else showList();
}

function extractTitle(md) {
  const match = md.match(/^# (.*)/);
  return match ? match[1] : "Untitled";
}

searchInput.addEventListener("input", showList);
tagFilter.addEventListener("change", showList);
window.addEventListener("hashchange", router);

loadIndex();
</script>

</body>
</html>
