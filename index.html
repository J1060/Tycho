<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>tycho NEWS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: #f5f5f2;
}

header {
  background: #fff;
  padding: 18px;
  font-weight: bold;
  border-bottom: 1px solid #ddd;
}

main {
  max-width: 800px;
  margin: auto;
  padding: 20px;
}

.article {
  padding: 15px;
  border-bottom: 1px solid #ddd;
  cursor: pointer;
}

.article:hover {
  background: #eee;
}

.tags {
  font-size: 12px;
  color: #555;
}
</style>
</head>

<body>

<header>tycho NEWS</header>

<main>
<div id="content">Loading...</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
let articles = [];
let cache = {};
let slugMap = {};
const contentDiv = document.getElementById("content");

async function loadMarkdown(file) {
  if (cache[file]) return cache[file];

  const res = await fetch("markdown/" + file);
  const text = await res.text();

  cache[file] = text;
  return text;
}

function extractTitle(md) {
  const match = md.match(/^# (.*)/);
  return match ? match[1] : "Untitled";
}

function extractPreview(md) {
  const lines = md.split("\\n").filter(l => l.trim());
  return lines[1] || "";
}

function slugify(text) {
  return text.toLowerCase().replace(/[^a-z0-9]+/g, "-");
}

async function loadIndex() {
  try {
    const res = await fetch("markdown/index.json");
    articles = await res.json();
  } catch (e) {
    contentDiv.innerHTML = "❌ Nepodařilo se načíst index.json";
    console.error(e);
    return;
  }

  await Promise.all(articles.map(a => loadMarkdown(a.file)));

  for (let a of articles) {
    const md = cache[a.file];
    const title = extractTitle(md);
    const slug = slugify(title);

    a.slug = slug;
    slugMap[slug] = a;
  }

  router();
}

function showList() {
  contentDiv.innerHTML = "";

  articles.forEach(a => {
    const md = cache[a.file];
    if (!md) return;

    const title = extractTitle(md);
    const preview = extractPreview(md);
    const tags = a.tags || [];

    const div = document.createElement("div");
    div.className = "article";

    div.innerHTML = `
      <h2>${title}</h2>
      <p>${preview}</p>
      <div class="tags">${tags.join(" • ")}</div>
    `;

    div.onclick = () => {
      location.hash = a.slug;
    };

    contentDiv.appendChild(div);
  });
}

function showArticle(file) {
  const md = cache[file];
  const html = marked.parse(md);

  contentDiv.innerHTML = `
    <button onclick="location.hash=''">← Zpět</button>
    ${html}
  `;
}

function router() {
  const hash = location.hash.replace("#", "");
  const a = slugMap[hash];

  if (a) showArticle(a.file);
  else showList();
}

window.addEventListener("hashchange", router);

loadIndex();
</script>

</body>
</html>
