<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>tycho NEWS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: "Georgia", "Times New Roman", serif;
  background: #f5f5f2;
  color: #111;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    linear-gradient(transparent 31px, rgba(0,0,0,0.03) 32px),
    linear-gradient(90deg, transparent 31px, rgba(0,0,0,0.03) 32px);
  background-size: 32px 32px;
  pointer-events: none;
  opacity: 0.4;
}

header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: #fff;
  border-bottom: 2px solid #ddd;
  padding: 18px 20px;
  font-weight: 700;
  font-size: 20px;
  text-transform: none; 
}

main {
  max-width: 900px;
  margin: auto;
  padding: 24px;
}

.toolbar {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 24px;
}

input, select {
  flex: 1;
  min-width: 180px;
  padding: 12px 14px;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-family: inherit;
}

.article-preview {
  background: #fff;
  border-bottom: 1px solid #ddd;
  padding: 18px;
  cursor: pointer;
}

.article-preview:hover {
  background: #f0f0ec;
}

.article-preview h2 {
  margin: 0 0 8px;
  font-size: 20px;
}

.article-preview p {
  margin: 0;
  color: #333;
  font-size: 15px;
}

.tags {
  margin-top: 10px;
  font-size: 12px;
  color: #162252;
  text-transform: uppercase;
}

.article-full {
  background: #fff;
  padding: 30px;
  border: 1px solid #ddd;
  line-height: 1.8;
}

.article-full img {
  max-width: 100%;
  height: auto;
  margin: 16px 0;
  border-radius: 8px;
  border: 1px solid #ddd;
}

button {
  margin-bottom: 16px;
  padding: 10px 14px;
  border: 1px solid #ccc;
  background: #fff;
  cursor: pointer;
}

button:hover {
  background: #eee;
}

.read-more {
  color: #1a73e8;
  font-weight: 600;
}
</style>
</head>

<body>

<header>tycho NEWS</header>

<main>

<div class="toolbar">
  <input id="search" placeholder="Search articles..." />
  <select id="tagFilter">
    <option value="all">All topics</option>
  </select>
</div>

<div id="content"></div>

</main>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
let articles = [];
let cache = {};
let slugMap = {};

const contentDiv = document.getElementById("content");
const searchInput = document.getElementById("search");
const tagFilter = document.getElementById("tagFilter");

async function loadMarkdown(file) {
  if (cache[file]) return cache[file];

  const res = await fetch("markdown/" + file);
  const text = await res.text();

  cache[file] = text;
  return text;
}

function extractTitle(md) {
  const match = md.match(/^# (.*)/);
  return match ? match[1] : "Untitled";
}

function extractPreview(md) {
  const lines = md.split("\n").filter(l => l.trim());
  return lines[1] || "";
}

function slugify(text) {
  return text
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-+|-+$/g, "");
}

function scoreText(text, query) {
  if (!query) return 1;

  const t = text.toLowerCase();
  const q = query.toLowerCase();

  let score = 0;

  if (t.includes(q)) score += 5;

  for (let w of q.split(" ").filter(Boolean)) {
    score += (t.match(new RegExp(w, "g")) || []).length;
  }

  return score;
}

async function loadIndex() {
  const res = await fetch("markdown/index.json");
  articles = await res.json();

  await Promise.all(articles.map(a => loadMarkdown(a.file)));

  for (let a of articles) {
    const md = cache[a.file];
    const title = extractTitle(md);

    const slug = a.slug || slugify(title);
    a.slug = slug;
    slugMap[slug] = a;
  }

  fillTagFilter();
  router();
}

function fillTagFilter() {
  const set = new Set();
  articles.forEach(a => a.tags.forEach(t => set.add(t)));

  set.forEach(tag => {
    const opt = document.createElement("option");
    opt.value = tag;
    opt.textContent = tag;
    tagFilter.appendChild(opt);
  });
}

async function showList() {
  contentDiv.innerHTML = "";

  const search = searchInput.value;
  const tag = tagFilter.value;

  let results = [];

  for (let a of articles) {
    const md = cache[a.file];
    if (!md) continue;

    if (tag !== "all" && !a.tags.includes(tag)) continue;

    const title = extractTitle(md);
    const preview = extractPreview(md);

    const score =
      scoreText(title, search) * 5 +
      scoreText(preview, search) * 3 +
      scoreText(md, search);

    if (search && score === 0) continue;

    results.push({ a, title, preview, score });
  }

  results.sort((a, b) => b.score - a.score);

  results.forEach(r => {
    const div = document.createElement("div");
    div.className = "article-preview";

    div.innerHTML = `
      <h2>${r.title}</h2>
      <p>${r.preview} <span class="read-more"> číst dále</span></p>
      <div class="tags">${r.a.tags.join(" • ")}</div>
    `;

    div.onclick = () => {
      window.location.hash = r.a.slug;
      showArticle(r.a.file);
    };

    contentDiv.appendChild(div);
  });
}

async function showArticle(file) {
  const md = cache[file];
  const html = marked.parse(md);

  contentDiv.innerHTML = `
    <button onclick="goHome()">← Back</button>
    <div class="article-full">${html}</div>
  `;
}

function goHome() {
  window.location.hash = "";
  showList();
}

function router() {
  const hash = window.location.hash.replace("#", "");
  const a = slugMap[hash];

  if (a) showArticle(a.file);
  else showList();
}

searchInput.addEventListener("input", () => {
  clearTimeout(window.__t);
  window.__t = setTimeout(showList, 120);
});

tagFilter.addEventListener("change", showList);
window.addEventListener("hashchange", router);

loadIndex();
</script>

</body>
</html>
