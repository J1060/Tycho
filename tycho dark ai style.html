<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Tycho News</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* =========================
   PREMIUM NEWSROOM THEME
   ========================= */

body {
  margin: 0;
  font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI;
  background: radial-gradient(circle at top, #0b1220, #05070d);
  color: #e5e7eb;
}

/* jemná síť v pozadí (news vibe) */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  opacity: 0.25;
}

/* HEADER */
header {
  position: sticky;
  top: 0;
  z-index: 50;

  backdrop-filter: blur(10px);
  background: rgba(10, 15, 25, 0.7);
  border-bottom: 1px solid rgba(255,255,255,0.08);

  padding: 18px 20px;
  font-weight: 700;
  letter-spacing: 0.5px;
  font-size: 18px;
}

/* LAYOUT */
main {
  max-width: 980px;
  margin: auto;
  padding: 24px;
}

/* =========================
   TOOLBAR (NEWS SEARCH BAR)
   ========================= */

.toolbar {
  display: flex;
  gap: 12px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

input, select {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  color: white;
  padding: 12px 14px;
  border-radius: 12px;
  outline: none;
  flex: 1;
  min-width: 180px;
  transition: 0.2s;
}

input:focus {
  border-color: rgba(168,85,247,0.6);
  box-shadow: 0 0 0 3px rgba(168,85,247,0.15);
}

/* =========================
   ARTICLE CARD (NEWS STYLE)
   ========================= */

.article-preview {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 18px;
  margin-bottom: 14px;

  cursor: pointer;
  transition: 0.25s;

  backdrop-filter: blur(8px);
}

.article-preview:hover {
  transform: translateY(-2px);
  background: rgba(255,255,255,0.06);
  border-color: rgba(168,85,247,0.3);
}

/* TITULEK */
.article-preview h2 {
  margin: 0 0 8px 0;
  font-size: 18px;
  font-weight: 700;
  line-height: 1.3;
}

/* TEXT PREVIEW */
.article-preview p {
  margin: 0;
  color: rgba(255,255,255,0.65);
  font-size: 14px;
  line-height: 1.5;
}

/* TAGS */
.tags {
  margin-top: 10px;
  font-size: 12px;
  color: rgba(168,85,247,0.9);
}

/* =========================
   ARTICLE DETAIL
   ========================= */

.article-full {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px;
  padding: 28px;
  line-height: 1.7;
}

/* BACK BUTTON */
button {
  margin-bottom: 16px;
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  color: white;
  cursor: pointer;
}

button:hover {
  background: rgba(168,85,247,0.15);
}

/* =========================
   HIGHLIGHT (GOOGLE STYLE)
   ========================= */

mark {
  background: #a855f7;
  color: white;
  padding: 0 4px;
  border-radius: 4px;
}

/* =========================
   MOBILE OPTIMIZATION
   ========================= */

@media (max-width: 640px) {
  main {
    padding: 14px;
  }

  header {
    font-size: 16px;
  }

  .article-preview h2 {
    font-size: 16px;
  }

  .toolbar {
    flex-direction: column;
  }
}
</style>
</head>

<body>

<header>
  TYCHO News
</header>

<main>

  <!-- SEARCH BAR -->
  <div class="toolbar">
    <input id="search" placeholder="Search articles..." />
    <select id="tagFilter">
      <option value="all">All topics</option>
    </select>
  </div>

  <div id="content"></div>

</main>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
/* =========================
   DATA + CACHE
   ========================= */

let articles = [];
let cache = {};

const contentDiv = document.getElementById("content");
const searchInput = document.getElementById("search");
const tagFilter = document.getElementById("tagFilter");

/* =========================
   LOAD INDEX
   ========================= */

async function loadIndex() {
  const res = await fetch("markdown/index.json");
  articles = await res.json();

  fillTagFilter();
  router();
}

/* =========================
   LOAD MARKDOWN
   ========================= */

async function loadMarkdown(file) {
  if (cache[file]) return cache[file];

  const res = await fetch("markdown/" + file);
  const text = await res.text();

  cache[file] = text;
  return text;
}

/* =========================
   EXTRACT DATA
   ========================= */

function extractTitle(md) {
  const match = md.match(/^# (.*)/);
  return match ? match[1] : "Untitled";
}

function extractPreview(md) {
  const lines = md.split("\n").filter(l => l.trim());
  return lines[1] || "";
}

/* =========================
   TAGS
   ========================= */

function getAllTags() {
  const set = new Set();
  articles.forEach(a => a.tags.forEach(t => set.add(t)));
  return [...set];
}

function fillTagFilter() {
  getAllTags().forEach(tag => {
    const opt = document.createElement("option");
    opt.value = tag;
    opt.textContent = tag;
    tagFilter.appendChild(opt);
  });
}

/* =========================
   SEARCH SCORE
   ========================= */

function scoreText(text, query) {
  if (!query) return 1;

  const t = text.toLowerCase();
  const q = query.toLowerCase();

  let score = 0;

  if (t.includes(q)) score += 5;

  for (let w of q.split(" ").filter(Boolean)) {
    score += (t.match(new RegExp(w, "g")) || []).length;
  }

  return score;
}

/* =========================
   LIST VIEW
   ========================= */

async function showList() {
  contentDiv.innerHTML = "";

  const search = searchInput.value;
  const tag = tagFilter.value;

  let results = [];

  for (let a of articles) {
    const md = await loadMarkdown(a.file);

    const title = extractTitle(md);
    const preview = extractPreview(md);

    if (tag !== "all" && !a.tags.includes(tag)) continue;

    const score =
      scoreText(title, search) * 5 +
      scoreText(preview, search) * 3 +
      scoreText(md, search);

    if (search && score === 0) continue;

    results.push({ a, md, title, preview, score });
  }

  results.sort((a, b) => b.score - a.score);

  results.forEach(r => {
    const div = document.createElement("div");
    div.className = "article-preview";

    div.innerHTML = `
      <h2>${r.title}</h2>
      <p>${r.preview}</p>
      <div class="tags">${r.a.tags.join(" • ")}</div>
    `;

    div.onclick = () => {
      window.location.hash = r.a.slug;
      showArticle(r.a.file);
    };

    contentDiv.appendChild(div);
  });
}

/* =========================
   ARTICLE VIEW
   ========================= */

async function showArticle(file) {
  const md = await loadMarkdown(file);
  const html = marked.parse(md);

  contentDiv.innerHTML = `
    <button onclick="goHome()">← Back</button>
    <div class="article-full">${html}</div>
  `;
}

function goHome() {
  window.location.hash = "";
  showList();
}

/* =========================
   ROUTER
   ========================= */

function router() {
  const hash = window.location.hash.replace("#", "");
  const a = articles.find(x => x.slug === hash);

  if (a) showArticle(a.file);
  else showList();
}

/* =========================
   EVENTS
   ========================= */

searchInput.addEventListener("input", showList);
tagFilter.addEventListener("change", showList);
window.addEventListener("hashchange", router);

loadIndex();
</script>

</body>
</html>
